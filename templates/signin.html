<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='signin.css') }}">
</head>

<body style="display:flex; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f5f5f5;">

  <!-- Left Section -->
  <div style="flex:1; display:flex; flex-direction:column; padding:40px 30px 60px 30px;">
    <div class="logo" style="font-size:28px; font-weight:700;">Prep AI</div>

    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
      <div style="max-width:520px; margin-bottom:24px;">
        <img src="{{ url_for('static', filename='photo/banner.png') }}"
             alt="Interview simulation illustration"
             style="width:100%; border-radius:16px; display:block;">
      </div>

      <p style="font-size:20px; font-weight:800; max-width:500px; color:#111; line-height:1.25;">
        Transforms your interview practice with real-time AI guidance.
      </p>
    </div>
  </div>

  <!-- Right Section -->
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:60px;">
    <div style="background:#fff; padding:40px 48px; border-radius:24px;
                box-shadow:0 2px 8px rgba(0,0,0,0.1); width:100%; max-width:420px;">

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <div>
          <p style="font-size:18px; margin:0 0 4px 0;">Welcome to <strong>Prep AI</strong></p>
          <h2 style="font-size:32px; margin:0;">Sign in</h2>
        </div>
        <div style="font-size:14px; color:#555; text-align:right; margin-top:8px;">
          <span>No Account ?</span><br>
          <a href="{{ url_for('routes.signup') }}" class="auth-link">Sign up</a>
        </div>
      </div>

      <form method="POST">

        <!-- Username -->
        <label style="display:block; margin-bottom:6px;">
          Enter your username or your email address
        </label>
        <input type="text"
               name="username"
               placeholder="username or email address"
               style="display:block; width:100%; margin:0 0 16px; padding:12px;
                      border-radius:12px; border:1px solid #ccc;">

        <!-- Password -->
        <label style="display:block; margin-bottom:6px;">
          Enter your password
        </label>

        <div style="position:relative; margin-bottom:8px;">
          <input type="password"
                 id="signinPassword"
                 name="password"
                 placeholder="password"
                 style="display:block; width:100%; padding:12px;
                        border-radius:12px; border:1px solid #ccc;">

          <!-- Eye Toggle Button -->
          <button type="button"
                  data-eye="signinPassword"
                  style="position:absolute; right:12px; top:50%;
                         transform:translateY(-50%);
                         border:none; background:transparent;
                         cursor:pointer; padding:4px;">

            <!-- Default eye-off icon -->
            <svg xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round"
                 width="20"
                 height="20"
                 style="stroke:#888;">
              <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
              <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
              <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
              <path d="m2 2 20 20"/>
            </svg>

          </button>
        </div>

        <!-- Forgot password -->
        <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
          <a href="{{ url_for('routes.forgot_password') }}" class="auth-link" style="font-size:14px;">
            Forgot Password
          </a>
        </div>

        <!-- Submit -->
        <button type="submit"
                style="width:100%; padding:14px;
                       background:#111; color:#fff;
                       border:none; border-radius:14px;
                       font-size:16px; font-weight:600; cursor:pointer;">
          Sign in
        </button>

      </form>
    </div>
  </div>

  <!-- External JS -->
  <script src="{{ url_for('static', filename='signin.js') }}"></script>

</body>
</html>
