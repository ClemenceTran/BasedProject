<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prep AI - Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='signin.css') }}">

</head>
<body>
  <!-- logo + centered image+tagline -->
  <div style="flex: 1; display:flex; flex-direction:column; padding:40px 30px 60px 30px;">
    <div class="logo">Prep AI</div>

    <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
      <div style="max-width:520px; margin-bottom:24px;">
        <img src="{{ url_for('static', filename='photo/pic1.jpeg') }}"
             alt="Interview simulation illustration"
             style="width:100%; border-radius:16px; display:block;">
      </div>

      <p style="font-size:20px; font-weight:1000; max-width:500px; color:#111; line-height:1.25;">
        Transforms your interview practice with real-time AI guidance.
      </p>
    </div>
  </div>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:60px;">
    <div style="background:#fff; padding:40px 48px; border-radius:24px;
                box-shadow:0 2px 8px rgba(0,0,0,0.1); width:100%; max-width:420px;">

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <div>
          <p style="font-size:18px; margin:0 0 4px 0;">Welcome to <strong>Prep AI</strong></p>
          <h2 style="font-size:32px; margin:0;">Sign in</h2>
        </div>
        <div style="font-size:14px; color:#555; text-align:right; margin-top:8px;">
          <span>No Account ?</span><br>
          <a href="{{ url_for('signup') }}" class="auth-link">Sign up</a>
        </div>
      </div>

      <form method="POST">
        <label style="display:block; margin-bottom:6px;">
          Enter your username or your email address
        </label>
        <input type="text" name="username" placeholder="username or email address"
               style="display:block; width:100%; margin:0 0 16px; padding:12px;
                      border-radius:12px; border:1px solid #ccc;">

        <label style="display:block; margin-bottom:6px;">
          Enter your password
        </label>
        <input type="password" name="password" placeholder="password"
               style="display:block; width:100%; margin:0 0 8px; padding:12px;
                      border-radius:12px; border:1px solid #ccc;">

        <!-- forgot password link -->
        <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
          <a href="{{ url_for('forgot_password') }}" class="auth-link" style="font-size:14px;">
            Forgot Password
          </a>
        </div>

        <button type="submit" class="auth-primary-btn" style="width:100%;">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
