<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='signin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>

<body class="auth-page auth-centered">

  <div class="auth-top">
    <div class="logo">Prep AI</div>
  </div>

  <div class="auth-center">
    <div class="auth-card-wide">

      <div class="auth-header-row">
        <a href="{{ url_for('auth.signin') }}" class="auth-back">
          ←
        </a>

        <h2>Create an account</h2>

        <div class="auth-header-spacer"></div>
      </div>

      <form method="POST">
        <input type="text" name="username" placeholder="username" class="auth-input">
        <input type="email" name="email" placeholder="email address" class="auth-input">
        <input type="password" name="password" placeholder="password" class="auth-input">

        <button type="submit" class="auth-primary-btn auth-full-btn">
          Register
        </button>
      </form>

    </div>
  </div>

</body>
</html>
