<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prep AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">Prep AI</div>
    <div class="menu-title">Main Menu</div>

    <ul class="menu-items">
      <li class="menu-item">
        <a href="{{ url_for('dashboard') }}"
           class="menu-link {% if page == 'dashboard' %}active{% endif %}">
           Dashboard
        </a>
      </li>

      <li class="menu-item">
        <a href="{{ url_for('interview') }}" class="menu-link">
           Interview
        </a>
      </li>

      <li class="menu-item">
        <a href="{{ url_for('insight') }}"
           class="menu-link {% if page == 'insight' %}active{% endif %}">
           Insight
        </a>
      </li>

      <li class="menu-item">
        <a href="{{ url_for('talent') }}"
           class="menu-link {% if page == 'talent' %}active{% endif %}">
           Talent
        </a>
      </li>

      <li class="menu-item">
        <a href="{{ url_for('profile') }}"
           class="menu-link {% if page == 'profile' %}active{% endif %}">
           Profile
        </a>
      </li>
    </ul>

    <a href="{{ url_for('login') }}" class="logout-btn">Log out</a>
  </div>

  <!-- Empty Main Content -->
  <div class="main-content">
    <!-- Intentionally left empty -->
  </div>

</body>
</html>
