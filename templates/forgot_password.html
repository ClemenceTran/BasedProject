<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prep AI – Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">

</head>
<body style="display:flex; flex-direction:column; min-height:100vh;">

  <!-- top logo -->
  <div style="padding:40px 30px 0 30px;">
    <div class="logo">Prep AI</div>
  </div>

  <!-- centered card -->
  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 30px 60px 30px;">
    <div style="background:#fff; padding:48px 56px; border-radius:32px;
                box-shadow:0 2px 8px rgba(0,0,0,0.1); width:100%; max-width:480px;">

      <h2 style="font-size:28px; text-align:center; margin:0 0 12px 0;">
        Forgot Password
      </h2>
      <p style="font-size:14px; text-align:center; color:#555; margin:0 0 24px 0;">
        Enter your email address and we will send you a link to reset your password.
      </p>

      <form method="POST">
        <input type="email" name="email" placeholder="email address"
               style="display:block; width:100%; margin:0 0 24px; padding:12px 14px;
                      border-radius:12px; border:1px solid #ccc;">

        <button type="submit" class="auth-primary-btn" style="width:100%;">Send reset link</button>
      </form>
    </div>
  </div>
</body>
</html>
