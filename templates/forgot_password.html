<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='signin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='forpass.css') }}">
</head>

<body>

  <div class="auth-top">
    <div class="logo">Prep AI</div>
  </div>

  <div class="auth-center">
    <div class="auth-card">

      <div class="auth-header-row">
        <a href="{{ url_for('auth.signin') }}" class="auth-back">←</a>
        <h2>Forgot Password</h2>
        <div class="auth-header-spacer"></div>
      </div>

      <p class="auth-subtext">
        Enter your email address and we will send you a link to reset your password.
      </p>
      {% if error %}
        <div style="background:#fff3f3;border:1px solid #f0c7c7;color:#8b1a1a;
                    padding:12px 14px;border-radius:12px;margin-bottom:14px;font-weight:600;">
          {{ error }}
        </div>
      {% endif %}

      {% if success %}
        <div style="background:#f3fff6;border:1px solid #cfead8;color:#0d6b2f;
                    padding:12px 14px;border-radius:12px;margin-bottom:14px;font-weight:600;">
          {{ success }}

          {% if demo_link %}
            <div style="margin-top:8px;">
              <a href="{{ demo_link }}" class="auth-link">Click here to reset password (Demo)</a>
            </div>
          {% endif %}
        </div>
      {% endif %}
      
      <form method="POST">
        <input type="email" name="email" placeholder="email address" class="auth-input">

        <button type="submit" class="auth-primary-btn auth-full-btn">
          Send reset link
        </button>
      </form>

    </div>
  </div>

</body>
</html>
