<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prep AI – Forgot Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='signin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='forpass.css') }}">
</head>

<body>

  <div class="auth-top">
    <div class="logo">Prep AI</div>
  </div>

  <div class="auth-center">
    <div class="auth-card">

      <div class="auth-header-row">
        <a href="{{ url_for('signin') }}" class="auth-back">←</a>
        <h2>Forgot Password</h2>
        <div class="auth-header-spacer"></div>
      </div>

      <p class="auth-subtext">
        Enter your email address and we will send you a link to reset your password.
      </p>

      <form method="POST">
        <input type="email" name="email" placeholder="email address" class="auth-input">

        <button type="submit" class="auth-primary-btn auth-full-btn">
          Send reset link
        </button>
      </form>

    </div>
  </div>

</body>
</html>
