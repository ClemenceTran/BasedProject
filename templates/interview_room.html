<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interview Room</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='interview_room.css') }}">
</head>

<body class="interview-room-page">

  <!-- Sidebar (keep) -->
  <div class="sidebar">
    <div class="logo">Prep AI</div>
    <div class="menu-title">Main Menu</div>

    <ul class="menu-items">
      <li class="menu-item"><a class="menu-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
      <li class="menu-item"><a class="menu-link active" href="{{ url_for('interview') }}">Interview</a></li>
      <li class="menu-item"><a class="menu-link" href="{{ url_for('insight') }}">Insight</a></li>
      <li class="menu-item"><a class="menu-link" href="{{ url_for('talent') }}">Talent</a></li>
      <li class="menu-item"><a class="menu-link" href="{{ url_for('profile') }}">Profile</a></li>
    </ul>

    <a class="logout-btn" href="{{ url_for('logout') }}">Log out</a>
  </div>

  <!-- Main -->
  <div class="main-content">

    <!-- Top row -->
    <div class="ir-topbar">
      <a href="{{ url_for('interview') }}" class="ir-back">←</a>
      <div class="ir-top-title">
        Interview Room <span class="ir-dot">—</span>
        <span id="modeLine">Mode: —</span>
      </div>
    </div>

    <!-- Messages (no box) -->
    <div id="chatBox" class="ir-chat"></div>

    <!-- Input bar -->
    <div class="ir-composer">
      <input id="msgInput" class="ir-input" type="text" placeholder="Type your answer..." />
      <button type="button" class="ir-send" id="sendBtn">Send</button>
    </div>

    <!-- Voice row -->
    <div class="ir-voice">
      <button type="button" class="ir-rec" id="recordBtn">🎙 Start Recording</button>
      <button type="button" class="ir-stop" id="stopBtn" disabled>Stop</button>
      <span id="recStatus" class="ir-mic">Mic: idle</span>
    </div>

  </div>

  <script src="{{ url_for('static', filename='interview_room.js') }}"></script>
</body>
</html>
