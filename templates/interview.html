<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='interview.css') }}">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">Prep AI</div>
    <div class="menu-title">Main Menu</div>

    <ul class="menu-items">
      <li class="menu-item active">
        <a href="{{ url_for('interview.interview') }}"
          class="menu-link active">
          <!-- Interview icon -->
          <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 10a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 14.286V4a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            <path d="M20 9a2 2 0 0 1 2 2v10.286a.71.71 0 0 1-1.212.502l-2.202-2.202A2 2 0 0 0 17.172 19H10a2 2 0 0 1-2-2v-1"/>
          </svg>
          <span>Interview</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="{{ url_for('routes.insight') }}"
          class="menu-link">

          <!-- Insight Icon -->
          <svg class="sidebar-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
            <path d="M3 3v16a2 2 0 0 0 2 2h16"/>
            <path d="M7 11h8"/>
            <path d="M7 16h12"/>
            <path d="M7 6h3"/>
          </svg>

          <span>Insight</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="{{ url_for('routes.talent') }}"
          class="menu-link">
          <!-- Talent Icon -->
          <svg class="sidebar-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
            <path d="M21 12c.552 0 1.005-.449.95-.998a10 10 0 0 0-8.953-8.951c-.55-.055-.998.398-.998.95v8a1 1 0 0 0 1 1z"/>
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
          </svg>

          <span>Talent</span>
        </a>
      </li>
      <li class="menu-item">
        <a href="{{ url_for('routes.profile') }}"
          class="menu-link">

          <!-- Profile Icon -->
          <svg class="sidebar-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
            <path d="M18 20a6 6 0 0 0-12 0"/>
            <circle cx="12" cy="10" r="4"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>

          <span>Profile</span>
        </a>
      </li>    
    </ul>

    <a class="logout-btn" href="{{ url_for('auth.signup') }}">
      <svg class="sidebar-icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round">
        <path d="m16 17 5-5-5-5"/>
        <path d="M21 12H9"/>
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      </svg>
      <span>Log out</span>
    </a>
  </div>

  <div class="main-content">

    <div class="mode-wrap">

      <!--Select CV + Job Describe -->
      <section id="step1">
        <h2>Select your CV</h2>

        <div class="interview-form">
          <input type="file" id="cvInput" accept=".pdf,.doc,.docx" style="display:none;">

          <div class="upload-box" id="uploadBox" role="button" tabindex="0">
            <svg class="upload-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round">
              <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
              <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
              <path d="M12 12v6"/>
              <path d="m15 15-3-3-3 3"/>
            </svg>
            <div class="upload-text">Upload your CV</div>
            <div class="file-name" id="fileName">No file selected</div>
          </div>

          <h3 style="margin-top:18px;">Job description</h3>
          <textarea
            id="jobDesc"
            class="job-textarea"
            rows="6"
            placeholder="Write short job description..."
          ></textarea>

          <div class="start-btn-wrap">
            <button type="button" class="start-btn" id="nextBtn">Next</button>
          </div>

          <p id="error1" class="error-text"></p>
        </div>
      </section>

      <!-- Select Interview Mode -->
      <section id="step2" class="hidden" style="display:none;">
        <h2>Select Interview Mode</h2>

        <div class="mode-cards">
          <button type="button" class="mode-card" data-mode="hr" id="hrCard">
            <svg class="mode-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                <circle cx="12" cy="8" r="5"/>
                <path d="M20 21a8 8 0 0 0-16 0"/>
              </svg>
            <div class="mode-label">HR</div>
          </button>

          <button type="button" class="mode-card" data-mode="technical" id="techCard">
            <svg class="mode-svg"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round">
                <path d="M18 5a2 2 0 0 1 2 2v8.526a2 2 0 0 0 .212.897l1.068 2.127a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45l1.068-2.127A2 2 0 0 0 4 15.526V7a2 2 0 0 1 2-2z"/>
                <path d="M20.054 15.987H3.946"/>
              </svg>
            <div class="mode-label">Technical</div>
          </button>
        </div>

        <p class="mode-focus" id="modeHint">Choose an interview mode.</p>

        <div class="center-btn">
          <button type="button" class="start-btn start-btn-secondary" id="backBtn">Back</button>
          <button type="button" class="start-btn" id="startBtn">Start</button>
        </div>

        <p id="error2" class="error-text"></p>
      </section>

    </div>
  </div>

  <script src="{{ url_for('static', filename='interview.js') }}"></script>
</body>
</html>
