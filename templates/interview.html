<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prep AI - Interview</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">Prep AI</div>
    <div class="menu-title">Main Menu</div>

    <ul class="menu-items">
      <li class="menu-item"><a class="menu-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
      <li class="menu-item"><a class="menu-link active" href="{{ url_for('interview') }}">Interview</a></li>
      <li class="menu-item"><a class="menu-link" href="{{ url_for('insight') }}">Insight</a></li>
      <li class="menu-item"><a class="menu-link" href="{{ url_for('talent') }}">Talent</a></li>
      <li class="menu-item"><a class="menu-link" href="{{ url_for('profile') }}">Profile</a></li>
    </ul>

    <a class="logout-btn" href="{{ url_for('logout') }}">Log out</a>
  </div>

  <!-- Main content -->
  <div class="main-content">

    <div class="mode-wrap">

      <!-- ============ STEP 1 ============ -->
      <section id="step1">
        <h2>Select your CV</h2>

        <div class="interview-form">
          <input type="file" id="cvInput" accept=".pdf,.doc,.docx" style="display:none;">

          <div class="upload-box" id="uploadBox" role="button" tabindex="0">
            <div class="upload-plus">+</div>
            <div class="upload-text">Upload your CV</div>
            <div class="file-name" id="fileName">No file selected</div>
          </div>

          <h3 style="margin-top:18px;">Job description</h3>
          <textarea
            id="jobDesc"
            class="job-textarea"
            rows="6"
            placeholder="Write short job description..."
          ></textarea>

          <div class="start-btn-wrap">
            <button type="button" class="start-btn" id="nextBtn">Next</button>
          </div>

          <p id="error1" class="error-text"></p>
        </div>
      </section>

      <!-- ============ STEP 2 ============ -->
      <!-- IMPORTANT: style="display:none;" ensures it's hidden even without .hidden css -->
      <section id="step2" class="hidden" style="display:none;">
        <h2>Select</h2>

        <div class="mode-cards">
          <button type="button" class="mode-card" data-mode="hr" id="hrCard">
            <div class="mode-icon">👤</div>
            <div class="mode-label">HR</div>
          </button>

          <button type="button" class="mode-card" data-mode="technical" id="techCard">
            <div class="mode-icon">💻</div>
            <div class="mode-label">Technical</div>
          </button>
        </div>

        <p class="mode-focus" id="modeHint">Choose an interview type.</p>

        <div class="center-btn" style="display:flex; gap:10px; justify-content:center;">
          <button type="button" class="start-btn" id="backBtn" style="background:#333;">Back</button>
          <button type="button" class="start-btn" id="startBtn">Start</button>
        </div>

        <p id="error2" class="error-text"></p>
      </section>

    </div>
  </div>

  <script src="{{ url_for('static', filename='interview.js') }}"></script>
</body>
</html>
