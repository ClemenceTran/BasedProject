<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='signin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='reset_password.css') }}">
</head>

<body>

  <div class="auth-top">
    <div class="logo">Prep AI</div>
  </div>

  <div class="auth-center">
    <div class="auth-card-wide">

      <div class="auth-header-row">
        <a href="{{ url_for('auth.forgot_password') }}" class="auth-back">
          ←
        </a>

        <h2>Reset password</h2>
        
        {% if error %}
        <div class="auth-error">
        {{ error }}
        </div>
        {% endif %}
        </div>

        <div class="auth-header-spacer"></div>
      <form method="POST">
        <label class="field-label">New password</label>
        <div class="field-wrap">
          <input class="field" type="password" name="new_password" id="newPassword" minlength="6" required>
          <button class="eye" type="button" data-eye="newPassword" aria-label="Toggle password">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
              <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
              <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
              <path d="m2 2 20 20"/>
            </svg>
          </button>
        </div>

        <label class="field-label">Confirm new password</label>
        <div class="field-wrap">
          <input class="field" type="password" name="confirm_password" id="confirmPassword" minlength="6" required>
          <button class="eye" type="button" data-eye="confirmPassword" aria-label="Toggle password">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
              <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
              <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
              <path d="m2 2 20 20"/>
            </svg>
          </button>
        </div>

        <p class="hint" id="pwHint">Minimum 6 characters.</p>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Update</button>
        </div>
      </form>

    </div>
  </div>

  <script src="{{ url_for('static', filename='reset_password.js') }}"></script>
</body>
</html>
